<!DOCTYPE html>
<html>

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Plateforme e-learning UCBC : cours, évaluations, certificats et suivi de progression.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="E-Learning UCBC">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Désactive le service worker de Flet : conçu pour un support hors-ligne
       d'une app Flutter web statique, il verrouille en cache (par empreinte
       de contenu) TOUS les assets — favicon, icônes, manifest, cette page
       elle-même — dès la première visite. Sans ce script, un visiteur déjà
       venu une fois ne verrait plus jamais nos mises à jour de branding
       (logo, titre…), même après un nouveau déploiement. Doit s'exécuter
       AVANT flutter_bootstrap.js (chargé en fin de <body>). -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (reg) { reg.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function (names) {
          names.forEach(function (name) { caches.delete(name); });
        });
      }
      navigator.serviceWorker.register = function () {
        return Promise.resolve({ unregister: function () { return Promise.resolve(true); } });
      };
    }
  </script>

  <!-- Flet specific -->
  <meta name="flet-route-url-strategy" content="%FLET_ROUTE_URL_STRATEGY%">
  <meta name="flet-web-pyodide" content="%FLET_WEB_PYODIDE%">
  <meta name="flet-websocket-endpoint-path" content="/ws">

  <title>E-Learning UCBC</title>
  <link rel="manifest" href="manifest.json">

  <script>
    var webRenderer = "auto";
    var useColorEmoji = false;
  </script>

  <!-- webRenderer -->
  <!-- useColorEmoji -->

  <!-- pyodideCode -->
</head>

<body>
  <div id="loading">
    <style>
      body {
        inset: 0;
        overflow: hidden;
        margin: 0;
        padding: 0;
        position: fixed;
        background: #F9FAFB;
      }

      #loading {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        width: 100%;
      }

      #loading img {
        animation: 1s ease-in-out 0s infinite alternate breathe;
        opacity: .66;
        transition: opacity .4s;
      }

      #loading.main_done img {
        opacity: 1;
      }

      #loading.init_done img {
        animation: .33s ease-in-out 0s 1 forwards zooooom;
        opacity: .05;
      }

      @keyframes breathe {
        from {
          transform: scale(0.4);
          opacity: 1.0;
        }

        to {
          transform: scale(0.35);
          opacity: .7;
        }
      }

      @keyframes zooooom {
        from {
          transform: scale(0.4)
        }

        to {
          transform: scale(10)
        }
      }
    </style>
    <img src="icons/loading-animation.png" alt="Chargement..." />
  </div>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Bannière d'installation PWA personnalisée (Android/desktop Chrome/Edge). -->
  <div id="pwa-install-banner" style="
    display:none; position:fixed; left:16px; right:16px; bottom:16px; z-index:9999;
    max-width:420px; margin:0 auto; background:#FFFFFF; color:#111827;
    border-radius:16px; box-shadow:0 8px 28px rgba(0,0,0,.18);
    padding:14px 16px; align-items:center; gap:12px; font-family:Roboto,Arial,sans-serif;
  ">
    <img src="icons/icon-192.png" width="40" height="40" style="border-radius:10px; flex-shrink:0;" alt="" />
    <div style="flex:1; min-width:0;">
      <div style="font-weight:700; font-size:14px;">Installer E-Learning UCBC</div>
      <div style="font-size:12px; color:#6B7280;">Accès rapide depuis votre écran d'accueil.</div>
    </div>
    <button id="pwa-install-btn" style="
      background:#2563EB; color:#fff; border:none; border-radius:10px;
      padding:8px 14px; font-weight:600; font-size:13px; cursor:pointer; flex-shrink:0;
    ">Installer</button>
    <button id="pwa-dismiss-btn" aria-label="Fermer" style="
      background:transparent; border:none; color:#9CA3AF; font-size:18px;
      cursor:pointer; padding:0 4px; flex-shrink:0;
    ">✕</button>
  </div>
  <script>
    (function () {
      var deferredPrompt = null;
      var banner = document.getElementById('pwa-install-banner');
      var installBtn = document.getElementById('pwa-install-btn');
      var dismissBtn = document.getElementById('pwa-dismiss-btn');
      var DISMISS_KEY = 'ucbc_pwa_install_dismissed';

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (!sessionStorage.getItem(DISMISS_KEY)) {
          banner.style.display = 'flex';
        }
      });

      installBtn.addEventListener('click', function () {
        banner.style.display = 'none';
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function () { deferredPrompt = null; });
        }
      });

      dismissBtn.addEventListener('click', function () {
        banner.style.display = 'none';
        sessionStorage.setItem(DISMISS_KEY, '1');
      });

      window.addEventListener('appinstalled', function () {
        banner.style.display = 'none';
      });
    })();
  </script>
</body>

</html>
